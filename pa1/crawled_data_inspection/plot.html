    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const plot = document.querySelectorAll('.plotly-graph-div')[0];
        const totalPoints = 1972;

        function updateRatio() {
            let visiblePoints = 0;

            plot.data.forEach(trace => {
                if (trace.visible === undefined || trace.visible === true) {
                    if (trace.x) {
                        visiblePoints += trace.x.length;
                    }
                }
            });

            const ratio = visiblePoints / totalPoints;

            Plotly.relayout(plot, {
                'annotations[1].text': `Visible points: ${(ratio*100).toFixed(2)}% (${visiblePoints}/${totalPoints})`
            });
        }

        plot.on('plotly_restyle', function() {
            updateRatio();
        });
    });
    </script>
