version: '3.8'
name: web-scraper
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: appdb
    volumes:
      - ./db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  client:
    build: ./client
    depends_on:
      - db
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:example@db:5432/appdb
    ports:
      - "5001:5000"

  server:
    build: ./server
    depends_on:
      - db
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:example@db:5432/appdb
    ports:
      - "5002:5000"

volumes:
  db_data:
